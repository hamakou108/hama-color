allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  spawn-sync: true
  unrs-resolver: true

# Note: Align with Renovate settings (`config:best-practices` > `security:minimumReleaseAgeNpm`)
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  # Renovate security update: vite@8.0.5
  - vite@8.0.5
  # Renovate security update: postcss@8.5.10
  - postcss@8.5.10
